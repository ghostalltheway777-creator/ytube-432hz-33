name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # kraeves for at action-gh-release kan oprette/opdatere release'en

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy JS assets into Android project
        run: |
          cp pitch-processor.js android/app/src/main/assets/
          cp inject.js android/app/src/main/assets/

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with build number
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/YTube-432Hz-33-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTube-432Hz-33-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/YTube-432Hz-33-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: YTube 432Hz 33 — Android APK
          body: |
            **Version ${{ github.run_number }} — Download og installer på din Android-telefon.**

            1. Download APK-filen herunder
            2. Åbn filen (tillad installation fra ukendte kilder)
            3. Åbn appen — YouTube i 432 Hz
          files: android/app/build/outputs/apk/debug/YTube-432Hz-33-v${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
